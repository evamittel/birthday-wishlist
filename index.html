<!DOCTYPE html>
<html>
<head>
  <title>Eva’s 25th Birthday 🎂</title>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      margin: 0;
      padding: 0;
      background: linear-gradient(to right, #e6a958, #e26545);
      text-align: center;
    }

    h1 {
      margin-top: 20px;
      color: #02040f;
    }

    #countdown {
      font-size: 18px;
      margin: 10px;
      font-weight: bold;
    }

    .container {
      max-width: 1000px;
      margin: auto;
      padding: 10px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-top: 20px;
    }

    .card {
      background: rgba(255,255,255,0.8);
      backdrop-filter: blur(12px);
      border-radius: 18px;
      padding: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
      transition: 0.25s;
      overflow: hidden;
    }

    .card:hover {
      transform: translateY(-6px);
      box-shadow: 0 12px 25px rgba(0,0,0,0.15);
    }

    .card img {
      width: 100%;
      aspect-ratio: 1/1;
      object-fit: cover;
      border-radius: 12px;
    }

    a {
      color: #e33b5a;
      text-decoration: none;
      font-weight: bold;
      font-size: 14px;
    }

    button {
      margin-top: 10px;
      background: linear-gradient(135deg, #ff4d6d, #ff758f);
      color: white;
      border: none;
      padding: 8px 14px;
      border-radius: 10px;
      cursor: pointer;
    }

    .reserved {
      background: grey;
    }

    textarea {
      width: 80%;
      max-width: 400px;
      height: 100px;
      border-radius: 10px;
      border: none;
      padding: 10px;
      margin-top: 10px;
    }

    /* Responsive */
    @media (max-width: 900px) {
      .grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 500px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

<h1>🎉 Eva’s 25th Birthday Wishlist 🎁</h1>
<p>Pick something you'd love to gift me 💖</p>

<div id="countdown"></div>

<div class="container">
  <div id="wishlist" class="grid"></div>
</div>

<!-- 💌 MESSAGE -->
<div class="section">
  <h2>💌 Leave me a message</h2>
  <textarea id="msg" placeholder="Write something sweet... 💖"></textarea><br>
  <button onclick="sendMessage()">Send Message</button>
</div>

<script>
// 🎂 Countdown
const birthday = new Date("2026-05-08");

function updateCountdown() {
  const now = new Date();
  const diff = birthday - now;

  if (diff <= 0) {
    document.getElementById("countdown").innerText = "🎉 It’s my birthday!";
    return;
  }

  const days = Math.floor(diff / (1000 * 60 * 60 * 24));
  const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);

  document.getElementById("countdown").innerText =
    `⏳ ${days} days ${hours} hrs to go!`;
}

setInterval(updateCountdown, 1000);
updateCountdown();

// 🎁 DATA (FLAT)
const data = [
  {
    name: "Theater Piggys",
    link: "https://theater.xyz/products/twiggy-piggies",
    image: "https://theater.xyz/cdn/shop/files/1_34.jpg"
  },
  {
    name: "Speedcat",
    link: "https://in.puma.com/in/en/pd/speedcat-og-sneakers/398846",
    image: "https://images.puma.com/image/upload/f_auto,q_auto,b_rgb:fafafa,w_1200,h_1200/global/398846/31/sv01/fnd/IND/fmt/png/Speedcat-OG-Sneakers"
  },
  {
    name: "Sambas",
    link: "https://www.adidas.co.in/samba-og-shoes/ID0477.html",
    image: "https://encrypted-tbn3.gstatic.com/shopping?q=tbn:ANd9GcRw_amENluldek47GqtZY1emdlI0DADefhxPlqfE-QedOng1uIQ"
  },
  {
    name: "Laneige Lip Mask",
    link: "https://www.tirabeauty.com/product/laneige-lip-sleeping-mask-sweet-candy-ex-8-g-7607179",
    image: "https://cdn.tirabeauty.com/v2/billowing-snowflake-434234/tira-p/wrkr/products/pictures/item/free/resize-w:1080/1143612/ykRUkL96z-1143612_1.jpg"
  },
  {
    name: "Laneige Lip balm",
    link: "https://www.tirabeauty.com/product/laneige-lip-glowy-balm-sweet-candy-10-g-7600087",
    image: "https://cdn.tirabeauty.com/v2/billowing-snowflake-434234/tira-p/wrkr/products/pictures/item/free/resize-w:1080/1143616/1_l9hT2fV_-1143616_1.jpg"
  },
  {
    name: "Maybelline Teddy Tint",
    link: "https://www.tirabeauty.com/product/maybelline-new-york-superstay-teddy-tint-lip-and-cheek-color-skinny-dip-5-ml-7605494",
    image: "https://cdn.tirabeauty.com/v2/billowing-snowflake-434234/tira-p/wrkr/products/pictures/item/free/resize-w:1080/1153313/nawuzZtglz-1153313_1.jpg"
  },
  {
    name: "Airpods",
    link: "https://www.apple.com/in/shop/buy-airpods",
    image: "https://store.storeimages.cdn-apple.com/1/as-images.apple.com/is/airpods-4-anc-select-202409_FV1"
  },
  {
    name: "Accessories",
    link: "https://i.pinimg.com/736x/19/d4/a4/19d4a44ed37f3a4d2fedb3b9cce2280f.jpg",
    image: "https://i.pinimg.com/736x/19/d4/a4/19d4a44ed37f3a4d2fedb3b9cce2280f.jpg"
  },
  {
    name: "Clothes",
    link: "https://www.zara.com/in/en/woman-trousers-linen-l2237.html?v1=2419267&regionGroupId=230",
    image: "https://in.pinterest.com/pin/5488830792739250/"
  }
];

// 🎯 Render
let reserved = JSON.parse(localStorage.getItem("reserved")) || [];
const container = document.getElementById("wishlist");

data.forEach((item, index) => {
  const isReserved = reserved.includes(index);

  const card = document.createElement("div");
  card.className = "card";

  card.innerHTML = `
    <img src="${item.image}" />
    <h3>${item.name}</h3>
    <a href="${item.link}" target="_blank">View Item</a><br>
    <button onclick="reserve(${index})" class="${isReserved ? 'reserved' : ''}">
      ${isReserved ? "Reserved 🎉" : "Reserve"}
    </button>
  `;

  container.appendChild(card);
});

// 🎯 Reserve
function reserve(id) {
  if (!reserved.includes(id)) {
    reserved.push(id);
    localStorage.setItem("reserved", JSON.stringify(reserved));
    location.reload();
  }
}

// 💌 Email
function sendMessage() {
  const message = document.getElementById("msg").value;

  if (!message) {
    alert("Write something first 😊");
    return;
  }

  const email = "evamittel88@gmail.com";

  window.location.href =
    `mailto:${email}?subject=For Eva’s 25th 💖&body=${encodeURIComponent(message)}`;
}
</script>

</body>
</html>
